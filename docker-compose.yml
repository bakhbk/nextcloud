name: nextcloud

services:
  db:
    image: mariadb:10.6
    restart: always
    command:
      - --transaction-isolation=READ-COMMITTED
      - --log-bin=binlog
      - --binlog-format=MIXED
      - --bind-address=*
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - nextcloud_db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    image: nextcloud:apache
    restart: always
    ports:
      - 8080:80
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - nextcloud_system:/var/www/html
      - ${NEXTCLOUD_USER_DATA_DIR}:/var/www/html/data
    environment:
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_HOST=db
      - REDIS_HOST=redis
      - NC_skeletondirectory=
      - NEXTCLOUD_TRUSTED_DOMAINS=${NEXTCLOUD_TRUSTED_DOMAINS}
      - OVERWRITEHOST=${OVERWRITE_HOST}

  redis:
    image: redis:alpine
    restart: always

volumes:
  nextcloud_db:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${NEXTCLOUD_DB_DIR}
  nextcloud_system:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${NEXTCLOUD_SYSTEM_DIR}


